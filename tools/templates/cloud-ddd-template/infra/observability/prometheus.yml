global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: prod
    environment: production

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

# Alert rules
rule_files:
  - "/etc/prometheus/rules/*.yaml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # OpenTelemetry Collector metrics
  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888
    metrics_path: /metrics

  # Kubernetes API server
  - job_name: kubernetes-apiservers
    kubernetes_sd_configs:
      - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

  # Kubernetes nodes
  - job_name: kubernetes-nodes
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  # Kubernetes pods with Prometheus annotation
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - templates
            - observability
    relabel_configs:
      # Only scrape pods with prometheus annotation
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      
      # Get port from annotation
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: ${1}:${2}
      
      # Get path from annotation
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      
      # Add labels
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name

  # Templates API service discovery
  - job_name: templates-api
    static_configs:
      - targets:
          - templates-api:8080
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # RabbitMQ metrics (if Prometheus plugin installed)
  - job_name: rabbitmq
    static_configs:
      - targets:
          - rabbitmq:15692

  # Redis metrics (if Redis Exporter deployed)
  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121

  # SQL Server metrics (if SQL Server Exporter deployed)
  - job_name: mssql
    static_configs:
      - targets:
          - mssql-exporter:9161

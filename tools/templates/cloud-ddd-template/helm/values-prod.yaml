replicaCount: 5

autoscaling:
  enabled: true
  minReplicas: 5
  maxReplicas: 20
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

config:
  ASPNETCORE_ENVIRONMENT: Production
  LOG_LEVEL: Information
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  RESILIENCE_CIRCUIT_THRESHOLD: "3"
  RESILIENCE_TIMEOUT_SECONDS: "30"

secrets:
  otelExporterEndpoint: "http://otel-collector.observability:4317"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "200"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
        - path: /health
          pathType: Prefix
  tls:
    - secretName: templates-api-tls-prod
      hosts:
        - api.example.com

service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

podDisruptionBudget:
  enabled: true
  minAvailable: 2

database:
  host: sql-prod.database.azure.com
  port: 1433
  connection_timeout: 30
  query_timeout: 30
  pool:
    min_connections: 10
    max_connections: 100

cache:
  host: redis-prod
  port: 6379
  ttl: 7200
  replicas: 3

messaging:
  broker: rabbitmq-prod
  port: 5672
  exchange: templates.events
  durability: true
  retryCount: 5

observability:
  tracing:
    enabled: true
    samplingRate: 0.1
    otelCollector: http://otel-collector.observability:4317
  metrics:
    enabled: true
    scrapeInterval: 15s
  logging:
    level: Information
    format: json
    retention: 30d
